name: pages

on:
  push:
    branches: [main]
    tags:
      - "v*"
    paths:
      - "site/**"
      - "bench/browser-*-fixture.mjs"
      - "packages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The site bundles the built lakeql-* packages, so build them first.
      - run: pnpm build

      - name: Generate browser R2 benchmark fixtures
        run: |
          node bench/browser-spatial-fixture.mjs
          node bench/browser-window-fixture.mjs

      - name: Upload browser R2 benchmark fixtures
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN is not available; skipping R2 fixture upload and using the currently published benchmark objects."
            exit 0
          fi
          pnpm dlx wrangler@4.100.0 r2 object put lakeql-public/bench/spatial.parquet --file bench/generated/browser-r2/spatial.parquet --content-type application/octet-stream --cache-control "public, max-age=31536000, immutable" --remote
          pnpm dlx wrangler@4.100.0 r2 object put lakeql-public/bench/window-events.parquet --file bench/generated/browser-r2/window-events.parquet --content-type application/octet-stream --cache-control "public, max-age=31536000, immutable" --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - run: pnpm --filter lakeql-site build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
